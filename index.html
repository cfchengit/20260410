<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue.js 範例目錄</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 320px;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .header {
            padding: 20px;
            background-color: #1a252f;
            text-align: center;
            border-bottom: 1px solid #34495e;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #42b983; /* Vue 經典綠色 */
        }
        .header .student-id {
            margin-top: 10px;
            font-size: 1rem;
            color: #bdc3c7;
        }
        .menu {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .menu li {
            border-bottom: 1px solid #34495e;
        }
        .menu li a {
            display: block;
            padding: 15px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: background-color 0.3s, padding-left 0.3s;
        }
        .menu li a:hover {
            background-color: #34495e;
            padding-left: 25px; /* 滑鼠懸停時字體微幅右移 */
            color: #42b983;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>Vue.js 範例目錄</h1>
                <div class="student-id">學號：<span>12345678</span></div>
            </div>
            <ul class="menu">
                <li><a href="ex1/index.html" target="contentFrame">範例一 (ex1) - 我的第一個 Vue 頁面</a></li>
                <li><a href="ex2/index.html" target="contentFrame">範例二 (ex2) - 資料呈現與綁定</a></li>
                <li><a href="ex3/index.html" target="contentFrame">範例三 (ex3) - 事件處理 (methods)</a></li>
                <li><a href="ex4/index.html" target="contentFrame">範例四 (ex4) - 雙向綁定 (v-model)</a></li>
                <li><a href="ex5/index.html" target="contentFrame">範例五 (ex5) - 條件渲染 (v-if)</a></li>
                <li><a href="ex6/index.html" target="contentFrame">範例六 (ex6) - 列表渲染 (v-for)</a></li>
                <li><a href="ex7/index.html" target="contentFrame">範例七 (ex7) - 計算屬性 (computed)</a></li>
                <li><a href="ex8/index.html" target="contentFrame">範例八 (ex8) - 動態樣式與類別 (class & style)</a></li>
                <li><a href="ex9/index.html" target="contentFrame">範例九 (ex9) - 待辦事項清單專案</a></li>
            </ul>
        </div>
        <div class="content">
            <iframe name="contentFrame" src="ex1/index.html" title="範例展示區"></iframe>
        </div>
    </div>
</body>
</html>
